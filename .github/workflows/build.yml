name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip mod
        run: unzip dashword_mod.zip
      - name: Build
        run: |
          cd dashword_mod
          chmod +x gradlew
          ./gradlew build
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: dashword-jar
          path: dashword_mod/build/libs/*.jar
